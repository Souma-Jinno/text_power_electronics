  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="16.4">サイリスタ2トランジスタ等価回路 (chapter02, sec2.7, キャリアの動き～ラッチ動作)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="40.4">Q2=PNP(アノード側), Q1=NPN(カソード側), 中央2層共有をクロスカップリングで表現</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="64.4">Q2エミッタ=アノード, Q2コレクタ-&gt;Q1ベース, Q1コレクタ-&gt;Q2ベース, Q1エミッタ=カソード(0V)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="88.4">ゲート電流はQ1(NPN)ベースへPULSE(0 10mA 1m 1u 1u 1m 100m)で注入(1ms後に1ms幅で立つ)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="112.4">主回路: VAA=12V - RL=100ohm - アノード, カソード接地</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="136.4">着目点: ゲートパルス消滅後(t&gt;2ms)もアノード電流が流れ続ける=ラッチ動作(教科書sec2.7の核心)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="160.4">Rshunt=1k(Q1ベース-カソード間)は実SCRのカソードショント抵抗の模擬。理想Ebers-Mollモデルの</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="184.4">正帰還ループはRshuntが無いと遮断状態が数値的に不安定になり、ゲート電流ゼロでも誤ってオン点に</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="208.4">収束してしまうため追加した(教科書本文には無いモデル化上の工夫、回路動作の主張には影響しない)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="368.4">.model QNPN2 NPN(BF=50)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="392.4">.model QPNP2 PNP(BF=50)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="416.4">.control</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="440.4">tran 10u 10m</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="464.4">print v(anode) v(gbase) i(vaa)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="488.4">write chapter02/thyristor_two_transistor.raw</text>
  </g>
  <g class="text-group">

        <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="end" x="24" y="32.4">Isweep</text>
      </g>
    </g>
    <g transform="rotate(180, 24, 72)">
      <g class="text-group">
        <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="end" x="24" y="80.4">0.1</text>
      </g>
    </g>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="16.4">IGBT簡易等価回路 (chapter02, sec2.6, 例題2.3の定性的検証用)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="40.4">【注記】これは実IGBTデバイスのSPICEマクロモデルではない。教育目的の簡易等価回路であり、</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="64.4">sec2.6本文の説明「縦型MOSFETの裏面n+層をp形に置き換えただけ」に基づき、</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="88.4">MOSFETチャネル(M1, ゲートは常時オン=VGG=15V&gt;&gt;Vth=3Vで固定)と</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="112.4">追加のpn接合1個分の電圧降下(D1, Is/N調整でVf~0.5-0.6V)を直列にしただけの</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="136.4">非公式マクロモデルである(IGBT実デバイスのSPICEモデルではない)。</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="160.4">vcol=M1ドレイン(等価コレクタ), vmid=M1ソース/D1アノード(M1とD1の間), emitter=0V</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="184.4">電流掃引0.1-60Aでvcolを観測し、回路2(mosfet_output_char)のRon*I型上昇と比較する</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="328.4">.model MYNMOS NMOS(LEVEL=1 VTO=3 KP=2)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="352.4">.model DMOD D(Is=1e-9 N=1.0 Rs=0.001)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="376.4">.control</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="400.4">dc Isweep 0.1 60 0.1</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="424.4">print v(vcol) v(vmid)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="448.4">write chapter02/igbt_equivalent_von.raw</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="472.4">.endc</text>
  </g>

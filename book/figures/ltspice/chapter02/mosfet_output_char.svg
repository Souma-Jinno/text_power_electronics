  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="16.4">NMOS出力特性試験回路 (chapter02, sec2.5, fig2.5の概念・def2.2 Vth=2-4V)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="40.4">M1: Vth=3V(教科書の2-4V範囲内), ソース接地(ボディもソースと同電位)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="64.4">VGS=2V(Vthよりわずかに下)/3V/4V/5Vの4本の出力特性を掃引で比較</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="88.4">期待: VGS=2Vはほぼ電流ゼロ、VGS=4V,5Vは原点から直線的に立ち上がる(0.7V下駄なし)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="288.4">.model MYNMOS NMOS(LEVEL=1 VTO=3 KP=2)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="312.4">.control</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="336.4">dc VDS 0 10 0.2 VGS 2 5 1</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="360.4">print v(vd) v(vg) i(vds)</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="384.4">write chapter02/mosfet_output_char.raw</text>
  </g>
  <g class="text-group">
    <text fill="black" font-family="Arial" font-size="24.0px" text-anchor="start" x="16" y="408.4">.endc</text>
  </g>
